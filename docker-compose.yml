services:
  postgres:
    image: postgres:16-alpine
    container_name: greenhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenhouse
      POSTGRES_USER: greenhouse_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-greenhouse_pass}
    ports:
      - "5432:5432"
    volumes:
      - greenhouse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse_user -d greenhouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greenhouse-net

  backend:
    build: ./backend
    container_name: greenhouse-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/greenhouse
      DB_USERNAME: greenhouse_user
      DB_PASSWORD: ${DB_PASSWORD:-greenhouse_pass}
      JWT_SECRET: ${JWT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH2_ENABLED: ${OAUTH2_ENABLED:-false}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-}
      OAUTH2_ADMIN_EMAILS: ${OAUTH2_ADMIN_EMAILS:-}
      IA_URL: ${IA_URL:-http://greenhouse-ia:5000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      SEEDER_ENABLED: ${SEEDER_ENABLED:-true}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_TLS: ${SMTP_TLS:-false}
    ports:
      - "8080:8080"
    networks:
      - greenhouse-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  ia:
    build: ./ia
    container_name: greenhouse-ia
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: greenhouse
      DB_USER: greenhouse_user
      DB_PASS: ${DB_PASSWORD:-greenhouse_pass}
    ports:
      - "5000:5000"
    networks:
      - greenhouse-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:5000/ia/health'); exit(0) if r.status==200 else exit(1)\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_OAUTH_ENABLED: ${VITE_OAUTH_ENABLED:-false}
    container_name: greenhouse-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - greenhouse-net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  greenhouse_postgres_data:

networks:
  greenhouse-net:
    driver: bridge
