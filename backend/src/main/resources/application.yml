spring:
  application:
    name: greenhouse-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/greenhouse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_TLS:false}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  ia-url: ${IA_URL:http://localhost:5000}
  jwt-secret: ${JWT_SECRET:dev-only-change-me-in-production-0123456789abcdef0123456789abcdef}
  jwt-expiration-ms: 86400000
  taiga:
    api-url: ${TAIGA_API_URL:https://api.taiga.io/api/v1}
    token: ${TAIGA_TOKEN:}
    project-id: ${TAIGA_PROJECT_ID:}
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
  oauth2:
    enabled: ${OAUTH2_ENABLED:false}
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
    admin-emails: ${OAUTH2_ADMIN_EMAILS:}
  github:
    token: ${GITHUB_TOKEN:}
    owner: ${GITHUB_OWNER:}
    repo: ${GITHUB_REPO:}

greenhouse:
  seeder:
    admin-password: ${ADMIN_PASSWORD:admin_dev_change_me}
  email:
    enabled: ${EMAIL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
