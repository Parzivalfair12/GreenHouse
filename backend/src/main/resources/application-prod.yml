    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${FRONTEND_URL}
  ia-url: ${IA_URL}
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-ms: 86400000
  oauth2:
    enabled: ${OAUTH2_ENABLED:false}
    redirect-uri: ${OAUTH2_REDIRECT_URI:}
    admin-emails: ${OAUTH2_ADMIN_EMAILS:}

greenhouse:
  seeder:
    admin-password: ${ADMIN_PASSWORD}
  email:
    enabled: ${EMAIL_ENABLED}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${PORT:8080}
