# Test profile — H2 in-memory, no external services
spring:
  datasource:
    url: jdbc:h2:mem:greenhouse-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  ia-url: http://localhost:59999
  jwt-secret: test-only-secret-must-be-at-least-32-characters-long-ok
  jwt-expiration-ms: 86400000
  frontend-url: http://localhost:5173
  taiga:
    api-url: https://api.taiga.io/api/v1
    token:
    project-id: 0
    connect-timeout-ms: 1000
    read-timeout-ms: 1000
  github:
    token:
    owner:
    repo:
  oauth2:
    admin-emails:

greenhouse:
  email:
    enabled: false
  seeder:
    admin-password: test_admin_password
